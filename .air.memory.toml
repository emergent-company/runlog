# .air.memory.toml — hot-reload dev server for memory e2e (port 17432).
# Usage:  task test:server:memory
root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && go build -o /tmp/runlog-air-memory ./cmd/runlog"
  entrypoint = ["/tmp/runlog-air-memory"]
  args_bin = ["--daemon", "--db", "/root/emergent.memory.e2e/.runlog/runs.db", "--port", "17432"]
  include_ext = ["go", "templ"]
  exclude_dir = ["tmp", "vendor", ".git", "node_modules", "test-results"]
  exclude_regex = [".*_test.go", ".*_templ.go", ".*tests-result.*"]
  exclude_file = []
  delay = 500
  log = "build-errors.log"
  send_interrupt = true
  kill_delay = "2s"
  stop_on_error = true

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
