# lefthook.yml — TypeScript SDK lint tasks.
#
# Install hooks:   lefthook install
# Run lint only:   lefthook run lint
#
# Individual contributors can override in lefthook-local.yml (not committed).

# ── Manual lint group (task lint → lefthook run lint) ────────────────────────
lint:
  parallel: true
  jobs:
    - name: typecheck
      run: pnpm typecheck
      root: sdk/typescript

    - name: build
      run: pnpm build
      root: sdk/typescript

    - name: no-secrets
      run: gitleaks dir . --config .gitleaks.toml --no-banner
