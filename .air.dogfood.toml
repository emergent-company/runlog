# .air.dogfood.toml — hot-reload dogfood daemon (port 17433).
# runlog tracks its own test runs here.
# Install air: go install github.com/air-verse/air@latest
# Usage:  task dogfood:server
root = "."
tmp_dir = "tmp"

[build]
  cmd = "templ generate && templ generate -f vendor/github.com/emergent-company/go-daisy/components/ui/code-preview.templ && go build -o /tmp/runlog-air-dogfood ./cmd/runlog"
  entrypoint = ["/tmp/runlog-air-dogfood"]
  args_bin = ["--daemon", "--dev", "--db", "/tmp/runlog-dogfood.db", "--port", "17433"]
  include_ext = ["go", "templ"]
  exclude_dir = ["tmp", "vendor", ".git", "node_modules", "test-results"]
  exclude_regex = [".*_test.go", ".*_templ.go", ".*tests-result.*"]
  exclude_file = []
  delay = 500
  log = "build-errors.log"
  send_interrupt = true
  kill_delay = "2s"
   stop_on_error = false

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"
